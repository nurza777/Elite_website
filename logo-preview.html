<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
  body { background: #222; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; gap: 40px; }
  .box { background: linear-gradient(135deg, #074C7A, #064066); width: 80px; height: 80px; border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 12px; box-sizing: border-box; }
  img { width: 100%; height: 100%; object-fit: contain; }
  .box2 { width: 40px; height: 40px; border-radius: 10px; padding: 6px; }
  .box3 { width: 200px; height: 200px; border-radius: 24px; padding: 30px; }
</style>
</head>
<body>
  <div class="box box3"><img src="images/logo-icon.svg" alt="logo"></div>
  <div class="box"><img src="images/logo-icon.svg" alt="logo"></div>
  <div class="box box2"><img src="images/logo-icon.svg" alt="logo"></div>
</body>
</html>
